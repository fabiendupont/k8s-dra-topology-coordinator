apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nodepartition.fullname" . }}-controller
  labels:
    {{- include "nodepartition.controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nodepartition.fullname" . }}-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "nodepartition.controller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
