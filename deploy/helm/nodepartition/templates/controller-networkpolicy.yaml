{{- if .Values.controller.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nodepartition.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nodepartition.controller.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nodepartition.controller.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow health check probes from kubelet
    - ports:
        - port: {{ .Values.controller.healthPort }}
          protocol: TCP
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow Kubernetes API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
{{- end }}
