apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nodepartition.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nodepartition.controller.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      {{- include "nodepartition.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nodepartition.controller.selectorLabels" . | nindent 8 }}
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.controller.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "nodepartition.controller.serviceAccountName" . }}
      {{- with .Values.controller.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: {{ include "nodepartition.controller.image" . }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          args:
            - --driver-name={{ .Values.driverName }}
            - --shutdown-timeout={{ .Values.controller.shutdownTimeout }}
            - --leader-election-namespace={{ .Values.controller.leaderElection.namespace }}
            - --leader-election-id={{ .Values.controller.leaderElection.id }}
            - --webhook-port={{ .Values.controller.webhook.port }}
            - --tls-cert=/etc/webhook/tls/tls.crt
            - --tls-key=/etc/webhook/tls/tls.key
          ports:
            - name: health
              containerPort: {{ .Values.controller.healthPort }}
              protocol: TCP
            - name: webhook
              containerPort: {{ .Values.controller.webhook.port }}
              protocol: TCP
          volumeMounts:
            - name: webhook-tls
              mountPath: /etc/webhook/tls
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.controller.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.controller.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: webhook-tls
          secret:
            secretName: {{ include "nodepartition.fullname" . }}-webhook-tls
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
