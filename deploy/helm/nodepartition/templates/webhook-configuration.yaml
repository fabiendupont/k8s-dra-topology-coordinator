apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "nodepartition.fullname" . }}
  labels:
    {{- include "nodepartition.controller.labels" . | nindent 4 }}
  annotations:
    {{- if eq .Values.controller.webhook.tls.mode "openshift" }}
    service.beta.openshift.io/inject-cabundle: "true"
    {{- end }}
    {{- if eq .Values.controller.webhook.tls.mode "cert-manager" }}
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "nodepartition.fullname" . }}-webhook
    {{- end }}
webhooks:
  - name: claims.nodepartition.dra.k8s.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    rules:
      - apiGroups: ["resource.k8s.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["resourceclaims"]
    clientConfig:
      service:
        name: {{ include "nodepartition.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /mutate
      {{- if eq .Values.controller.webhook.tls.mode "manual" }}
      caBundle: {{ .Values.controller.webhook.tls.caBundle | b64enc }}
      {{- end }}
